site_name: LevelDB Tutorial
site_dir: site
docs_dir: docs/leveldb

nav:
  - Home: index.md
  - 01_数据库核心读写引擎.md
  - 02_writebatch原子批量写入.md
  - 03_预写日志_wal.md
  - 04_memtable内存表与跳表.md
  - 05_sstable排序表文件格式.md
  - 06_版本管理与manifest.md
  - 07_合并压缩_compaction.md
  - 08_迭代器层次体系.md
  - 09_布隆过滤器与过滤策略.md
  - 10_lru缓存与tablecache.md

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
